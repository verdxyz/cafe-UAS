services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: cafe-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cafe_db
      MYSQL_USER: cafe_user
      MYSQL_PASSWORD: cafe_secret
    volumes:
      - cafe_mysql_data:/var/lib/mysql
    networks:
      - cafe-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cafe-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=cafe_db
      - DB_USERNAME=cafe_user
      - DB_PASSWORD=cafe_secret
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cafe-network

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: cafe-nginx
    restart: unless-stopped
    ports:
      - "81:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - cafe-network

networks:
  cafe-network:
    driver: bridge

volumes:
  cafe_mysql_data:
