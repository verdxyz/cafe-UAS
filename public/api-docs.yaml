openapi: 3.0.3
info:
  title: Backend Website Café API
  description: API Documentation for the Café Management System. Includes authentication, menus, orders, reservations, and reviews.
  version: 1.0.0
servers:
  - url: http://localhost:8000/api
    description: Local development server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
paths:
  /auth/register:
    post:
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nama:
                  type: string
                  example: Verdy
                email:
                  type: string
                  example: verdy@example.com
                password:
                  type: string
                  example: 123456
                role:
                  type: string
                  enum: [admin, pengunjung]
                  example: pengunjung
      responses:
        '201':
          description: Created
        '422':
          description: Validation Error
  /auth/login:
    post:
      summary: Login user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: verdy@example.com
                password:
                  type: string
                  example: 123456
      responses:
        '200':
          description: OK
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /auth/refresh:
    post:
      summary: Refresh JWT Token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: OK
        '401':
          description: Unauthorized
  /menu:
    get:
      summary: Get list of menus
      security: []
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: OK
    post:
      summary: Create a menu
      description: Admin only
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nama:
                  type: string
                kategori:
                  type: string
                harga:
                  type: number
                stok:
                  type: integer
      responses:
        '201':
          description: Created
        '403':
          description: Forbidden
  '/menu/{id}':
    get:
      summary: Get a specific menu
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
    put:
      summary: Update a menu
      description: Admin only
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OK
        '403':
          description: Forbidden
    delete:
      summary: Delete a menu
      description: Admin only
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
        '403':
          description: Forbidden
  /orders:
    get:
      summary: Get list of orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: OK
    post:
      summary: Create an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                menu_id:
                  type: integer
                jumlah:
                  type: integer
      responses:
        '201':
          description: Created
        '422':
          description: Unprocessable Entity (Insufficient stock)
  '/orders/{id}':
    put:
      summary: Update an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OK
    delete:
      summary: Delete an order
      description: Admin only
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
  /orders/report:
    get:
      summary: Get order report
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [daily, weekly, monthly]
      responses:
        '200':
          description: OK
  /reservations:
    get:
      summary: Get list of reservations
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: OK
    post:
      summary: Create a reservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tanggal:
                  type: string
                  format: date
                jam:
                  type: string
                jumlah_orang:
                  type: integer
      responses:
        '201':
          description: Created
  '/reservations/{id}':
    put:
      summary: Update a reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OK
    delete:
      summary: Delete a reservation
      description: Admin only
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
  /reviews:
    get:
      summary: Get list of reviews
      security: []
      parameters:
        - name: menu_id
          in: query
          schema:
            type: integer
        - name: rating
          in: query
          schema:
            type: integer
        - name: user_id
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: OK
    post:
      summary: Create a review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                menu_id:
                  type: integer
                rating:
                  type: integer
                komentar:
                  type: string
      responses:
        '201':
          description: Created
  '/reviews/{id}':
    put:
      summary: Update a review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OK
    delete:
      summary: Delete a review
      description: Admin only
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
